<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Chef-One">
  <defs>
    <!-- Curva suave para el texto (ligera sonrisa tipográfica) -->
    <path id="chefOneArc" d="M 82 218 Q 256 188 430 218" fill="none" />
  </defs>
  <rect width="512" height="512" fill="#fafafa" />
  <!-- Líneas negras, finas, como acento editorial -->
  <line
    x1="56"
    y1="168"
    x2="456"
    y2="168"
    stroke="#141414"
    stroke-width="1.35"
    stroke-linecap="round"
  />
  <text
    font-family="Georgia, 'Times New Roman', ui-serif, serif"
    font-size="40"
    font-style="italic"
    font-weight="400"
    fill="#D32F2F"
    letter-spacing="0.04em"
  >
    <textPath href="#chefOneArc" startOffset="50%" text-anchor="middle">
      Chef-One
    </textPath>
  </text>
  <line
    x1="56"
    y1="258"
    x2="456"
    y2="258"
    stroke="#141414"
    stroke-width="1.35"
    stroke-linecap="round"
  />
</svg>
