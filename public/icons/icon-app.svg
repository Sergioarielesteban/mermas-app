<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Chef-One">
  <defs>
    <linearGradient id="iconBloodLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D32F2F" stop-opacity="0" />
      <stop offset="42%" stop-color="#D32F2F" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#EF4444" stop-opacity="1" />
      <stop offset="58%" stop-color="#D32F2F" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#D32F2F" stop-opacity="0" />
    </linearGradient>
    <filter id="iconLineGlow" x="-15%" y="-250%" width="130%" height="600%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#ffffff" />
  <text
    x="256"
    y="238"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="56"
    font-weight="400"
    font-style="normal"
    fill="#D32F2F"
    letter-spacing="0.06em"
  >
    Chef-One
  </text>
  <line
    x1="100"
    y1="271"
    x2="412"
    y2="271"
    stroke="url(#iconBloodLine)"
    stroke-width="2"
    stroke-linecap="round"
    filter="url(#iconLineGlow)"
  />
</svg>
